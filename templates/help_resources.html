<!--html code for the page containing links for those who are looking out for other people-->
<head>
    <title> Helping others in need </title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <h1> How to support someone in need... </h1>
    <p> If you're supporting a friend or loved one, it may feel overwhelming and hard to get through to them. Here are some resources to aid in this: </p>
    <ul>
        {% for item in help_resources %}
        <li><a href="{{item.url}}" target="_blank">{{item.name}}</a></li>
        {% endfor %}
    </ul>
</body>
